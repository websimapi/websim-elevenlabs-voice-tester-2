                <div class="custom-voice">
                    <div class="input-group">
                        <input type="text" id="voiceIdInput" placeholder="Enter Voice ID..."/>
                        <button id="addVoiceBtn">Add</button>
                    </div>
                    <div class="voice-list" id="voiceList"></div>
                </div>
            </section>

            <section class="camera-section">
                <h2>Camera Text Capture</h2>
                
                <div class="camera-controls">
                    <button id="startCameraBtn">Start Camera</button>
                    <button id="captureTextBtn" disabled>Capture Text</button>
                    <button id="switchCameraBtn" disabled>Switch Camera</button>
                    <button id="stopCameraBtn" disabled>Stop Camera</button>
                </div>
                
                <div class="zoom-controls">
                    <button id="zoomOutBtn" disabled>🔍-</button>
                    <span id="zoomLevel" style="margin: 0 10px; font-size: 12px;">100%</span>
                    <button id="zoomInBtn" disabled>🔍+</button>
                    <button id="resetZoomBtn" disabled>Reset</button>
                </div>
                
                <div style="position: relative; overflow: hidden; border-radius: 8px; background: #000;">
                    <video id="cameraVideo" class="camera-video" autoplay playsinline></video>
                    <div id="captureOverlay" class="capture-text-overlay"></div>
                </div>
                
                <div class="tts-mode-toggle">
                    <label>
                        <input type="checkbox" id="useBrowserTTS">
                        Use Browser TTS
                    </label>
                </div>
                
                <div id="detectedText" class="detected-text-display"></div>
                
                <div class="text-capture-controls">
                    <button id="speakDetectedBtn" disabled>Speak Detected Text</button>
                    <button id="copyDetectedBtn" disabled>Copy to Input</button>
                    <button id="clearDetectedBtn" disabled>Clear</button>
                </div>
            </section>

            <section class="history-panel">
                <button class="download-all-btn" onclick="downloadAllHistory()">
                    Download All
                </button>
                <div class="history-list" id="historyList">
                    <!-- History items will be added here -->
                </div>
            </section>
        </main>

        <footer class="tts-footer">
            <div class="audio-container">
                <audio id="audioPlayer" controls></audio>
            </div>
            <div class="tts-input-container">
                <input type="text" id="textInput" placeholder="Enter text to speak..."/>
                <div class="tts-controls">
                    <button id="speakBtn" disabled>Speak</button>
                    <button id="stopBtn" disabled>Stop</button>
                </div>
            </div>
        </footer>
    </div>
